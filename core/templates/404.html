<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Rota Perdida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f5fff8;
      --bg-2: #ebfff6;
      --ink: #2e2234;
      --muted: #6d5f74;
      --brand: #26f1c0;
      --brand-soft: rgba(38, 241, 192, 0.22);
      --line: rgba(46, 34, 52, 0.12);
      --panel: rgba(255, 255, 255, 0.75);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 20%, var(--brand-soft), transparent 40%),
        radial-gradient(circle at 88% 16%, rgba(38, 241, 192, 0.14), transparent 36%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.14;
      pointer-events: none;
      background-image: radial-gradient(#000 0.4px, transparent 0.4px);
      background-size: 3px 3px;
      mix-blend-mode: multiply;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(55px);
      z-index: 0;
      animation: float 7s ease-in-out infinite;
    }

    .orb.one {
      width: 240px;
      height: 240px;
      background: rgba(38, 241, 192, 0.28);
      top: -60px;
      right: -40px;
    }

    .orb.two {
      width: 190px;
      height: 190px;
      background: rgba(58, 186, 160, 0.25);
      bottom: -50px;
      left: -40px;
      animation-delay: 1.4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-14px) scale(1.05); }
    }

    .panel {
      position: relative;
      width: min(680px, 100%);
      z-index: 1;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(46, 34, 52, 0.12);
      backdrop-filter: blur(10px);
      padding: 2rem;
      overflow: hidden;
      animation: reveal 0.6s ease both;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-radius: 999px;
      border: 1px solid rgba(46, 34, 52, 0.16);
      padding: 0.4rem 0.8rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      background: #ffffff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 12px rgba(38, 241, 192, 0.8);
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 7vw, 4.2rem);
      line-height: 1.05;
      margin-bottom: 0.7rem;
    }

    h1 span {
      display: block;
      color: #1a9f80;
      font-size: clamp(3.2rem, 12vw, 8rem);
      letter-spacing: 0.02em;
      margin-top: 0.2rem;
    }

    p {
      color: var(--muted);
      max-width: 50ch;
      line-height: 1.7;
      margin-bottom: 1.4rem;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 0.82rem 1.35rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn.primary {
      color: #13241f;
      background: linear-gradient(135deg, #13d7a7, #2af7c7);
      box-shadow: 0 10px 24px rgba(38, 241, 192, 0.35);
    }

    .btn.secondary {
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .code {
      margin-top: 1.3rem;
      font-size: 0.84rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .panel { padding: 1.35rem; border-radius: 20px; }
      p { font-size: 0.94rem; }
      .btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="panel">
    <div class="badge"><span class="dot"></span> mapa da casa falhou</div>
    <h1>Esta rota sumiu do radar.<span>404</span></h1>
    <p>
      O endereço que voce tentou acessar nao existe ou foi movido para outro ambiente.
      Volte para a central da NexHome e continue navegando com seguranca.
    </p>

    <div class="actions">
      <a class="btn primary" href="{% url 'home' %}">Ir para a Home</a>
      <a class="btn secondary" href="{% url 'dashboard' %}">Abrir Painel</a>
    </div>

    <div class="code">Erro HTTP 404 | Pagina nao encontrada</div>
  </main>
</body>
</html>
