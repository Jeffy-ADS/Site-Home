<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | NexHome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4fff9;
      --surface: #ffffff;
      --ink: #2d2130;
      --ink-soft: #6b5a6a;
      --brand: #29ffc9;
      --brand-dark: #14d8a9;
      --border: rgba(45,33,48,0.12);
      --danger: #a4203e;
      --shadow: 0 20px 50px rgba(45,33,48,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(41,255,201,0.18), transparent 42%),
        radial-gradient(circle at 90% 10%, rgba(20,216,169,0.12), transparent 35%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--ink);
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border-radius: 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 0.35rem;
    }
    .subtitle {
      color: var(--ink-soft);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .error-list {
      list-style: none;
      background: rgba(164,32,62,0.08);
      color: var(--danger);
      border: 1px solid rgba(164,32,62,0.2);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.45rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 0.9rem;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--brand-dark);
      box-shadow: 0 0 0 4px rgba(41,255,201,0.18);
    }
    .btn {
      width: 100%;
      border: 0;
      background: linear-gradient(135deg, var(--brand-dark), var(--brand));
      color: #1e1730;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.9rem;
      cursor: pointer;
      transition: transform 0.15s ease;
      margin-top: 0.4rem;
    }
    .btn:hover { transform: translateY(-1px); }
    .meta {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--ink-soft);
      text-align: center;
    }
    a {
      color: #0a8f6f;
      font-weight: 600;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Entrar</h1>
    <p class="subtitle">Acesse sua central NexHome.</p>

    {% if form.errors %}
      <ul class="error-list">
        <li>Usuário ou senha inválidos. Tente novamente.</li>
      </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Usuário</label>
      <input id="id_username" type="text" name="username" required autofocus>

      <label for="id_password">Senha</label>
      <input id="id_password" type="password" name="password" required>

      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <button class="btn" type="submit">Entrar no painel</button>
    </form>

    <p class="meta">Ainda não tem conta? <a href="{% url 'signup' %}">Criar conta</a></p>
    <p class="meta"><a href="{% url 'home' %}">Voltar para a home</a></p>
  </main>
</body>
</html>
